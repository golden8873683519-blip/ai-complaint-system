<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Success</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#0f172a,#1e293b,#334155);
  color:white;
  padding:20px;
}

.card{
  width:100%;
  max-width:500px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius:20px;
  padding:40px;
  text-align:center;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
  animation: fadeIn 0.6s ease-in-out;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.icon{
  font-size:60px;
  margin-bottom:15px;
}

h1{
  font-size:24px;
  margin-bottom:10px;
  color:#22c55e;
}

p{
  color:#cbd5e1;
  margin-bottom:25px;
  font-size:14px;
}

.btn{
  display:inline-block;
  padding:12px 25px;
  border-radius:12px;
  background:linear-gradient(90deg,#2563eb,#7c3aed);
  color:white;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
}

.secondary{
  display:block;
  margin-top:12px;
  font-size:13px;
  color:#94a3b8;
  text-decoration:none;
}

.secondary:hover{
  color:white;
}
</style>
</head>

<body>

<div class="card">

  <div class="icon">✅</div>

  <h1>Complaint Submitted Successfully</h1>

  <p>Your complaint has been registered successfully. You can track its status in your dashboard.</p>

  <a href="/dashboard/" class="btn">Go to Dashboard</a>

  <a href="/complaints/register-complaint/" class="secondary">Submit Another Complaint</a>

</div>

</body>
</html>

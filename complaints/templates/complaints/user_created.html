<!doctype html>
<html>
  <head>
    <title>Success</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        background:
          radial-gradient(
            circle at 10% 10%,
            rgba(59, 130, 246, 0.2),
            transparent 40%
          ),
          radial-gradient(
            circle at 90% 90%,
            rgba(124, 58, 237, 0.2),
            transparent 40%
          ),
          #0b1220;

        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
      }

      /* GLASS CARD */
      .card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 45px 35px;
        border-radius: 26px;
        text-align: center;
        backdrop-filter: blur(20px);
        box-shadow: 0 25px 70px rgba(0, 0, 0, 0.6);
        width: 360px;
        animation: pop 0.5s ease;
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        top: -80px;
        right: -80px;
        width: 180px;
        height: 180px;
        background: radial-gradient(
          circle,
          rgba(59, 130, 246, 0.25),
          transparent 70%
        );
      }

      .card::after {
        content: "";
        position: absolute;
        bottom: -80px;
        left: -80px;
        width: 180px;
        height: 180px;
        background: radial-gradient(
          circle,
          rgba(124, 58, 237, 0.2),
          transparent 70%
        );
      }

      @keyframes pop {
        from {
          transform: scale(0.8);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      /* ICON */
      .icon {
        font-size: 65px;
        color: #22c55e;
        margin-bottom: 10px;
        filter: drop-shadow(0 10px 20px rgba(34, 197, 94, 0.4));
      }

      /* TEXT */
      h2 {
        margin: 10px 0;
        font-size: 22px;
        font-weight: 700;
      }

      p {
        color: #cbd5e1;
        font-size: 14px;
        margin-bottom: 25px;
      }

      /* BUTTON */
      .btn {
        display: inline-block;
        padding: 12px 18px;
        background: linear-gradient(90deg, #3b82f6, #6366f1);
        color: white;
        text-decoration: none;
        border-radius: 12px;
        font-weight: 600;
        transition: 0.3s;
        box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 35px rgba(59, 130, 246, 0.45);
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="icon">✔</div>

      <h2>Registration Successful</h2>

      <p>
        Welcome {{ user.username }} 🎉<br />
        Your account has been created successfully.
      </p>

      <a href="{% url 'login' %}" class="btn"> Go to Login </a>
    </div>
  </body>
</html>

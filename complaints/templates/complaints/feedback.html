{% extends 'complaints/base.html' %} {% block content %}

<div class="container mt-5">
  <div class="card shadow p-4">
    <h3>⭐ Complaint Feedback</h3>

    <p>
      Complaint ID:
      <b>{{ complaint.complaint_id }}</b>
    </p>

    <form method="post">
      {% csrf_token %}

      <label class="form-label"> Overall Rating </label>

      <select name="rating" class="form-control mb-3">
        <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
        <option value="4">⭐⭐⭐⭐ Good</option>
        <option value="3">⭐⭐⭐ Average</option>
        <option value="2">⭐⭐ Poor</option>
        <option value="1">⭐ Very Poor</option>
      </select>

      <label class="form-label"> Resolution Speed </label>

      <select name="resolution_speed" class="form-control mb-3">
        <option>Very Fast</option>
        <option>Fast</option>
        <option>Average</option>
        <option>Slow</option>
        <option>Very Slow</option>
      </select>

      <label class="form-label"> Satisfaction </label>

      <select name="satisfaction" class="form-control mb-3">
        <option>Highly Satisfied</option>
        <option>Satisfied</option>
        <option>Neutral</option>
        <option>Unsatisfied</option>
        <option>Very Unsatisfied</option>
      </select>

      <label class="form-label"> Comments </label>

      <textarea
        name="comment"
        rows="5"
        class="form-control"
        placeholder="Share your experience..."
      ></textarea>

      <button class="btn btn-success mt-3">Submit Feedback</button>
    </form>
  </div>
</div>

{% endblock %}
